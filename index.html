<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unspoken - Secret Desire Deck</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <section class="screen active" id="welcome">
    <div class="logo">💜</div>
    <h1>Unspoken</h1>
    <p>Some things are easier to play than say.</p>
    <button onclick="showScreen('player1')">Start Game</button>
    <small>18+ • Consent first • Skip is always allowed</small>
  </section>

  <section class="screen" id="player1">
    <h2>Player 1</h2>
    <p>Write your secret wishes. One per line.</p>
    <textarea id="p1" placeholder="Example:
Slow dance together
Movie cuddle night
Give me a surprise compliment"></textarea>
    <button onclick="savePlayer1()">Save & Lock 🔒</button>
  </section>

  <section class="screen" id="player2">
    <h2>Player 2</h2>
    <p>Now pass the phone. One wish per line.</p>
    <textarea id="p2" placeholder="Your secret wishes..."></textarea>
    <button onclick="savePlayer2()">Create Deck 🎴</button>
  </section>

  <section class="screen" id="game">
    <div class="topbar">
      <div>
        <p class="label">Current Turn</p>
        <h3 id="turnName">Player 1</h3>
      </div>
      <div class="scorebox">
        <span>P1: <b id="p1Score">0</b></span>
        <span>P2: <b id="p2Score">0</b></span>
      </div>
    </div>

    <p class="hint">Pick one hidden card</p>
    <div id="deck"></div>
  </section>

  <section class="screen" id="result">
    <h2 id="cardTitle">Secret Card</h2>
    <div class="revealed-card">
      <p id="cardText"></p>
    </div>

    <div class="actions">
      <button onclick="completeTask()">Completed +10</button>
      <button class="skip" onclick="skipTask()">Skip -5</button>
    </div>
  </section>

  <section class="screen" id="final">
    <div class="logo">🏆</div>
    <h1>Game Over</h1>
    <p id="winnerText"></p>
    <button onclick="restartGame()">Play Again</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
